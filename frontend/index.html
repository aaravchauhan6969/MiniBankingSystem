<!DOCTYPE html>
<html>
<head>
  <title>Mini Bank</title>

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1><i class="fas fa-university"></i> Mini Banking</h1>

  <div class="form">
    <input type="text" id="name" placeholder="👤 Enter Name">
    <input type="number" id="amount" placeholder="💰 Enter Amount">
    <input type="number" id="id" placeholder="🆔 Account ID">
  </div>

  <div class="buttons">
    <button onclick="createAccount()" class="create">
      <i class="fas fa-user-plus"></i> Create
    </button>

    <button onclick="deposit()" class="deposit">
      <i class="fas fa-arrow-down"></i> Deposit
    </button>

    <button onclick="withdraw()" class="withdraw">
      <i class="fas fa-arrow-up"></i> Withdraw
    </button>

    <button onclick="checkBalance()" class="balance">
      <i class="fas fa-wallet"></i> Balance
    </button>
  </div>

  <!-- Loader -->
  <div id="loader" class="loader"></div>

  <div class="result-box">
    <h3 id="result">Result will appear here...</h3>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
